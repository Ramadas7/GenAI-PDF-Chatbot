<!DOCTYPE html>
<html>
<head>
    <title>Upload PDF</title>
</head>
<body>
<h1>AI Document Assistant</h1>
<form method="POST" enctype="multipart/form-data">
    <input
        type="file"
        name="pdf"
        accept=".pdf"
        required
    >
    <button type="submit">
        Upload
    </button>
</form>
</body>
</html>
